<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="name">Splatoon 3 Archipelago Hub</title>
    <!-- Link the CSS file -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 id="title">Splatoon 3 Archipelago Hub</h1>
    <p id="connectInstructions">Input Server Port and Port Name</p><br>
    <!-- Take input for Port, Slot name, and Password-->
    <label id="introPort">Port: </label>
    <input id="portInput"><br><br>
    <label id="introName">Slot Name: </label>
    <input id="slotNameInput"><br><br>
    <button id="submitButton">Connect</button><br>
    
    <!--Archipelago Output-->
    <div style="display: none;" id="archiChat" class="action-log-wrapper">
        <div class="action-log-header">Archipelago Chat</div>
        <div id="actionLog" class="action-log-body">
            <!-- Logs will be dynamically inserted here -->
        </div>
    </div>

    <!-- Link the JavaScript file safely at the bottom -->
    <script type="module" src="script.js"></script>
</body>
</html>
